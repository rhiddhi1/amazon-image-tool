<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Image Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-gray-50 min-h-screen flex flex-col items-center justify-center font-sans"
  >
    <!-- Container -->
    <div
      class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md text-center"
    >
      <!-- Headline -->
      <h1 class="text-3xl font-bold text-gray-800 mb-2">
        Fix Your Amazon Product Images
      </h1>
      <p class="text-gray-500 mb-6">
        Resize, center, and add white background instantly. Free & no signup.
      </p>

      <!-- File Input -->
      <label class="block mb-4">
        <input
          type="file"
          id="fileInput"
          class="hidden"
          onchange="showFileName()"
        />
        <div
          class="cursor-pointer bg-gray-100 hover:bg-gray-200 py-3 rounded-lg border border-gray-300"
        >
          <span id="fileLabel" class="text-gray-500">Select Image</span>
        </div>
      </label>

      <!-- Process Button -->
      <button
        id="processBtn"
        onclick="uploadImage()"
        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg w-full mb-4 transition"
      >
        Process Image
      </button>

      <!-- Status -->
      <p id="status" class="text-sm text-gray-500 mb-4"></p>

      <!-- Preview -->
      <div class="mb-4">
        <img id="preview" class="mx-auto rounded-lg shadow-lg max-h-80" />
      </div>

      <!-- Download -->
      <a
        id="downloadLink"
        class="hidden inline-block bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-6 rounded-lg w-full transition"
      >
        Download Image
      </a>

      <!-- Features -->
      <div class="mt-6 text-left text-sm text-gray-600 space-y-1">
        <p>✔ Resize to Amazon standard</p>
        <p>✔ Center your product automatically</p>
        <p>✔ White background every time</p>
      </div>
    </div>

    <script>
      // Show selected file name
      function showFileName() {
        const fileInput = document.getElementById("fileInput");
        const fileLabel = document.getElementById("fileLabel");
        if (fileInput.files.length > 0) {
          fileLabel.textContent = fileInput.files[0].name;
        }
      }

      // Upload & process
      async function uploadImage() {
        const fileInput = document.getElementById("fileInput");
        const file = fileInput.files[0];
        const status = document.getElementById("status");
        const btn = document.getElementById("processBtn");

        if (!file) {
          alert("Please select a file");
          return;
        }

        btn.disabled = true;
        btn.innerText = "Processing...";
        status.innerText = "Processing...";

        const formData = new FormData();
        formData.append("file", file);

        try {
          const response = await fetch("/process/", {
            method: "POST",
            body: formData,
          });

          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);

          document.getElementById("preview").src = url;

          const downloadLink = document.getElementById("downloadLink");
          downloadLink.href = url;
          downloadLink.download = "processed.jpg";
          downloadLink.classList.remove("hidden");

          status.innerText = "Done ✅";
        } catch (error) {
          status.innerText = "Something went wrong ❌";
        }

        btn.disabled = false;
        btn.innerText = "Process Image";
      }
    </script>
  </body>
</html>
