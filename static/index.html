<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Image Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-50 font-sans">
    <!-- Hero / Landing Section -->
    <section
      class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-20"
    >
      <div class="max-w-4xl mx-auto text-center px-4">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">Amazon Image Tool</h1>
        <p class="text-lg md:text-xl mb-6">
          Remove backgrounds and optimize your product images instantly. Perfect
          for Amazon sellers, e-commerce, and marketing.
        </p>
        <a
          href="#upload-section"
          class="bg-white text-blue-600 font-semibold px-6 py-3 rounded-lg hover:bg-gray-100 transition"
        >
          Process Your First Image
        </a>
      </div>
    </section>

    <!-- Upload / Processing Section -->
    <section id="upload-section" class="py-16">
      <div
        class="max-w-md mx-auto bg-white p-10 rounded-2xl shadow-lg text-center"
      >
        <h2 class="text-2xl font-bold mb-4">Upload Your Image</h2>
        <p class="text-gray-600 mb-6">
          Supported formats: PNG, JPEG, WebP, GIF
        </p>

        <input
          type="file"
          id="fileInput"
          class="mb-4 w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200"
        />

        <button
          id="processBtn"
          onclick="uploadImage()"
          class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition w-full mb-4"
        >
          Process Image
        </button>

        <p id="status" class="mt-4 text-sm text-gray-500"></p>

        <img
          id="preview"
          class="mt-4 rounded-lg shadow max-h-64 mx-auto hidden"
        />

        <a
          id="downloadLink"
          class="hidden mt-4 inline-block bg-green-500 text-white px-6 py-3 rounded-lg hover:bg-green-600 transition"
        >
          Download <span id="fileType"></span>
        </a>
      </div>
    </section>

    <script>
      async function uploadImage() {
        const fileInput = document.getElementById("fileInput");
        const file = fileInput.files[0];
        const status = document.getElementById("status");
        const btn = document.getElementById("processBtn");
        const preview = document.getElementById("preview");
        const downloadLink = document.getElementById("downloadLink");
        const fileTypeSpan = document.getElementById("fileType");

        if (!file) {
          alert("Please select a file");
          return;
        }

        btn.disabled = true;
        btn.innerText = "Processing...";
        status.innerText = "Processing...";
        preview.classList.add("hidden");
        downloadLink.classList.add("hidden");

        const formData = new FormData();
        formData.append("file", file);

        try {
          const response = await fetch("/process/", {
            method: "POST",
            body: formData,
          });
          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);

          // Show preview
          preview.src = url;
          preview.classList.remove("hidden");

          // Show download button
          downloadLink.href = url;
          const fileExt = blob.type.split("/")[1]; // png, jpeg, etc.
          downloadLink.download = `processed_${file.name}.${fileExt}`;
          fileTypeSpan.innerText = fileExt.toUpperCase();
          downloadLink.classList.remove("hidden");

          status.innerText = "Done ✅";
        } catch (error) {
          status.innerText = "Something went wrong ❌";
        }

        btn.disabled = false;
        btn.innerText = "Process Image";
      }
    </script>
  </body>
</html>
